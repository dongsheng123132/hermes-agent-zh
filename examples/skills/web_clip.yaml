# Web Clip Skill —— 抓网页保存为 Markdown 笔记
# License: MIT
#
# 用法（在 hermes chat 里）：
#   > 把 https://example.com/article 抓下来存成笔记

name: web_clip
description: |
  抓取一个网页 URL，转成 markdown，保存到 ~/notes/{date}-{slug}.md。
  当用户说"保存这个网页"、"剪藏 XX 文章"、"把这页存下来"时使用。

parameters:
  - name: url
    type: string
    required: true
    description: "完整 URL，必须以 http:// 或 https:// 开头"
  - name: tags
    type: array
    items:
      type: string
    required: false
    description: "可选标签，如 ['ai', '工具']"

script: |
  #!/usr/bin/env python3
  import sys, json, re, os, urllib.parse
  from pathlib import Path
  from datetime import date

  # 解析 stdin JSON 参数
  args = json.loads(sys.stdin.read())
  url = args['url']
  tags = args.get('tags', [])

  # 1. 抓页面
  import urllib.request
  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0 hermes-clip'})
  with urllib.request.urlopen(req, timeout=30) as resp:
      html = resp.read().decode('utf-8', errors='replace')

  # 2. HTML → Markdown（用 readability + html2text）
  try:
      from readability import Document
      from html2text import HTML2Text
      doc = Document(html)
      title = doc.title()
      content_html = doc.summary()
      h2t = HTML2Text()
      h2t.ignore_links = False
      h2t.body_width = 0
      content_md = h2t.handle(content_html)
  except ImportError:
      # 退路：纯文本
      title = re.search(r'<title>(.*?)</title>', html, re.S | re.I)
      title = title.group(1) if title else 'untitled'
      content_md = re.sub(r'<[^>]+>', '', html)

  # 3. 文件名
  slug = re.sub(r'[^\w\u4e00-\u9fff-]+', '-', title.strip())[:50]
  filename = f"{date.today().isoformat()}-{slug}.md"
  out_dir = Path.home() / 'notes'
  out_dir.mkdir(exist_ok=True)
  out_path = out_dir / filename

  # 4. 写入
  frontmatter = f"""---
title: {title}
url: {url}
clipped: {date.today().isoformat()}
tags: {tags}
---

# {title}

> 摘自：{url}

"""
  out_path.write_text(frontmatter + content_md, encoding='utf-8')

  print(json.dumps({
    "status": "ok",
    "title": title,
    "path": str(out_path),
    "size_bytes": out_path.stat().st_size,
  }, ensure_ascii=False))
