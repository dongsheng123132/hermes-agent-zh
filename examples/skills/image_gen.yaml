# Image Generation Skill —— 生成图像（DALL-E / SD / 国产）
# License: MIT
#
# 支持多个图像 API 后端：
#   - DALL-E (OpenAI)
#   - 通义万相（阿里云）
#   - 智谱 CogView
#   - 本地 Stable Diffusion (AUTOMATIC1111 API)
#
# .env 配置任一即可。优先级 dalle > tongyi > zhipu > sd

name: image_gen
description: |
  根据文字描述生成图像。当用户说"画一张"、"生成图片"、"配个图"时使用。
  注意：只生成 1 张图。多张请用户多次调用。

parameters:
  - name: prompt
    type: string
    required: true
    description: "图像描述（中英都行，建议英文效果好）"
  - name: aspect_ratio
    type: string
    enum: ["1:1", "16:9", "9:16", "4:3"]
    default: "1:1"
  - name: style
    type: string
    enum: ["realistic", "anime", "watercolor", "oil-painting", "sketch"]
    default: "realistic"

script: |
  #!/usr/bin/env python3
  import sys, json, os, urllib.request, time, hashlib
  from pathlib import Path

  args = json.loads(sys.stdin.read())
  prompt = args['prompt']
  ratio = args.get('aspect_ratio', '1:1')
  style = args.get('style', 'realistic')

  # Style 后缀
  style_suffix = {
      'realistic': ', photorealistic, 8k',
      'anime': ', anime style, vibrant colors',
      'watercolor': ', watercolor painting, soft brushstrokes',
      'oil-painting': ', oil painting, thick impasto',
      'sketch': ', pencil sketch, monochrome',
  }
  full_prompt = prompt + style_suffix.get(style, '')

  # Size from ratio
  size_map = {
      '1:1': '1024x1024',
      '16:9': '1792x1024',
      '9:16': '1024x1792',
      '4:3': '1280x960',
  }
  size = size_map.get(ratio, '1024x1024')

  # 输出路径
  out_dir = Path.home() / 'Pictures' / 'hermes-generated'
  out_dir.mkdir(parents=True, exist_ok=True)
  filename = f"{int(time.time())}-{hashlib.md5(prompt.encode()).hexdigest()[:8]}.png"
  out_path = out_dir / filename

  # 选 backend
  if os.environ.get('OPENAI_API_KEY'):
      # DALL-E
      req = urllib.request.Request(
          'https://api.openai.com/v1/images/generations',
          data=json.dumps({
              "model": "dall-e-3",
              "prompt": full_prompt,
              "size": size,
              "n": 1,
          }).encode(),
          headers={
              'Authorization': f'Bearer {os.environ["OPENAI_API_KEY"]}',
              'Content-Type': 'application/json',
          },
      )
      with urllib.request.urlopen(req, timeout=120) as resp:
          result = json.loads(resp.read())
          img_url = result['data'][0]['url']
      # 下载
      with urllib.request.urlopen(img_url) as r:
          out_path.write_bytes(r.read())
      backend = 'dalle-3'

  elif os.environ.get('DASHSCOPE_API_KEY'):
      # 通义万相（阿里云）
      # ... 此处省略具体实现，可用 dashscope SDK
      print(json.dumps({"error": "通义万相 backend 待实现"}))
      sys.exit(1)

  else:
      print(json.dumps({"error": "需要配置 OPENAI_API_KEY 或 DASHSCOPE_API_KEY"}))
      sys.exit(1)

  print(json.dumps({
    "status": "ok",
    "path": str(out_path),
    "prompt": full_prompt,
    "backend": backend,
    "size": size,
  }, ensure_ascii=False))
