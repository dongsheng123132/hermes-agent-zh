# 工作流：自动 PR 审查
# License: MIT

crons:
  - name: "auto-pr-review"
    schedule: "0 */2 * * 1-5"
    description: "工作日每 2 小时审一遍我的 PR"
    timezone: "Asia/Shanghai"

    provider: anthropic           # 代码审查 Claude 强
    model: claude-sonnet-4-5

    prompt: |
      ## 收集

      1. 用 github_search Skill 查：
         query: "is:pr is:open author:@me"
         max_results: 20

      2. 对每个 PR：
         - shell: gh pr diff {pr_number} 拿 diff
         - shell: gh pr view {pr_number} --json title,body,reviews 拿元信息

      ## 审查

      3. 对每个 PR 的 diff，从 4 个维度评估：

         ### 代码风格
         - 是否符合该项目 .eslintrc / .prettierrc
         - 命名是否清晰
         - 函数长度是否合理（> 80 行警告）

         ### 潜在 bug
         - undefined / null 处理
         - 异步代码 race condition
         - 边界条件

         ### 测试覆盖
         - 新代码是否有测试
         - 测试是否覆盖关键路径

         ### 性能
         - O(n²) 之类明显问题
         - 数据库 N+1 查询
         - 内存泄漏风险

      4. 评估结果分级：
         - 🟢 LGTM (looks good)
         - 🟡 Suggestion（建议改）
         - 🔴 Block（必须改）

      ## 输出

      5. 每个 PR 写一个审查草稿：
         file_write 到 ~/pr-reviews/PR-{pr_number}.md
         结构：
         - 总体评价
         - 4 维度详细评估
         - 具体改进建议（带行号）

      6. 汇总：
         lark_send 给我："本轮审查 N 个 PR，X 个 LGTM，Y 个建议，Z 个必改。
                       详情在 ~/pr-reviews/。最紧急的：PR #xxx"

      ## 注意

      - 不要直接 gh pr comment 发到 GitHub（这是草稿，等我审核）
      - Block 级别的严重问题用红色 emoji 标注

    timeout: 600
```
